name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build and push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t disisdsid/devops-assignment:latest ./service-a
          docker push disisdsid/devops-assignment:latest

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@203.0.113.45 "docker pull disisdsid/devops-assignment:latest && docker restart service-a"
