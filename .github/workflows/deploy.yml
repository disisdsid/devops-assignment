name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build service-a image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} ./service-a
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-assignment:latest

      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_USERNAME and DOCKER_PASSWORD must be set in repository secrets."
            exit 1
          fi

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to registry
        run: |
          docker push ${{ env.IMAGE_NAME }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@203.0.113.45 "docker pull ${{ env.IMAGE_NAME }} && docker restart service-a"
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-assignment:latest
